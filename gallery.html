<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patel Engineering Project Gallery</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: #333;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
            margin-bottom: -10px;
            font-size: 2.5em;
            letter-spacing: 2px;
            color: #444;
            animation: fadeIn 1s ease-in-out;
        }

        .container {
            display: flex;
            flex-direction: column;
            padding: 40px;
            gap: 40px;
            animation: slideIn 1s ease-in-out;
        }

        .section {
            width: 100%;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            overflow: hidden;
            background-color: #fff;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .section:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
        }

        .section h2 {
            text-align: center;
            padding: 15px;
            background-color: #2c3e50;
            color: #ecf0f1;
            margin: 0;
            font-size: 1.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 5px solid #3498db;
        }

        .image-gallery,
        .video-gallery {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .image-gallery img,
        .video-gallery video {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .image-gallery img:hover,
        .video-gallery video:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 1024px) {
            .container {
                padding: 24px;
                gap: 32px;
            }

            .image-gallery,
            .video-gallery {
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                padding: 0;
            }

            .image-gallery img,
            .video-gallery video {
                width: 100%;
                height: auto;
                min-height: 200px;
                aspect-ratio: 16/9;
                object-fit: cover;
            }

            .section {
                width: 100%;
                margin: 0;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
                letter-spacing: 1px;
                margin-top: 18px;
                margin-bottom: 8px;
            }

            .container {
                padding: 18px;
                gap: 24px;
            }

            .section h2 {
                font-size: 1.6rem;
                padding: 12px;
            }

            .image-gallery,
            .video-gallery {
                gap: 16px;
            }

            .image-gallery img,
            .video-gallery video {
                min-height: 180px;
            }

            .gallery-header {
                padding: 16px 18px 0;
            }

            .gallery-header .container {
                flex-direction: column;
                align-items: flex-start;
            }

            .back-link {
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            body {
                font-size: 14px;
            }

            .container {
                padding: 14px 12px;
                gap: 18px;
            }

            h1 {
                font-size: 1.6rem;
                margin: 12px 0;
            }

            .section {
                border-radius: 0;
                box-shadow: none;
            }

            .section h2 {
                font-size: 1.3rem;
                padding: 10px;
            }

            .image-gallery,
            .video-gallery {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .image-gallery img,
            .video-gallery video {
                min-height: 180px;
                aspect-ratio: 16/9;
            }

            .gallery-header {
                padding: 12px 12px 0;
            }

            .gallery-header .container {
                gap: 0.75rem;
            }

            .back-link {
                font-size: 0.95rem;
            }
        }


        /* Animation for fade-in and slide-in effects */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .gallery-header {
            padding: 20px 40px 0;
            background: #fff;
        }

        .gallery-header .container {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 1rem;
        }

        .back-link {
            color: #2c3e50;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
        }

        .back-link:hover {
            color: #5095df;
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0GNFM6Q3H0"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-0GNFM6Q3H0');
    </script>
</head>


<body>
    <header class="gallery-header">
        <div class="container">
            <a class="back-link" href="index.html">← Back to Home</a>
        </div>
    </header>

    <h1>Our Project Gallery</h1>

    <div class="container">

        <!-- Image Section -->
        <div class="section">
            <h2>Image Gallery</h2>
            <div class="image-gallery">
                <img src="Images/imagehome.jpg" alt="Dozer Image">
                <img src="Images/image1.jpg" alt="Dozer Image">

                <img src="Images/image3.jpg" alt="Hanomag K7 Dozer">
                <img src="Images/image4.jpg" alt="Hanomag K7 Dozer">
                <img src="Images/image5.jpg" alt="Hanomag K7 Dozer">
                <img src="Images/image6.jpg" alt="Hanomag K7 Dozer">
                <img src="Images/image7.jpg" alt="Hanomag K7 Dozer">
                <img src="Images/image8.jpg" alt="Hanomag K7 Dozer">
            </div>
        </div>

        <!-- Video Section -->
        <div class="section">
            <h2>Video Gallery</h2>
            <div class="video-gallery">

                <video src="Images/video9.mp4" title="Video 5" autoplay muted controls loop></video>
            </div>
        </div>
    </div>

</body>

</html>
